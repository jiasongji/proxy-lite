name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bash syntax
        run: bash -n proxy-lite.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: ShellCheck
        run: shellcheck proxy-lite.sh

      - name: Public docs audit
        run: |
          placeholder="Y""OUR_"
          ! grep -RIn "${placeholder}GITHUB_ORG\|${placeholder}" README.md Proxy-Lite-部署运维手册.html AUDIT.md
          ! grep -RInE 'BEGIN [A-Z ]*KEY|gho_[A-Za-z0-9_]+|ghp_[A-Za-z0-9_]+|AKIA[0-9A-Z]{16}' README.md Proxy-Lite-部署运维手册.html AUDIT.md
          ! grep -RInE 'scp|ssh -i|chmod 600|登录测试服务器|上传脚本' README.md Proxy-Lite-部署运维手册.html
          ! grep -RInE 'B_SS_PASSWORD=[^<]|b-upstream-secret|b-landing-secret|user-ss-secret|legacy-any|legacy-naive|DR-LA_.*id_ed25519' README.md Proxy-Lite-部署运维手册.html AUDIT.md
          ! grep -RInE '固定经 B 出口|固定经服务器 B|route\.final.?固定.?egress-b|不提供 Shadowsocks 用户入口' README.md Proxy-Lite-部署运维手册.html AUDIT.md

      - name: CLI help smoke tests
        run: |
          bash proxy-lite.sh help >/tmp/pl-help.out
          grep -q -- '--anytls-egress direct|egress-b' /tmp/pl-help.out
          grep -q -- '--ss-egress direct|egress-b' /tmp/pl-help.out
          grep -q -- '--components anytls|naive|ss' /tmp/pl-help.out
          bash proxy-lite.sh backup help >/tmp/pl-backup-help.out
          bash proxy-lite.sh rollback help >/tmp/pl-rollback-help.out
          bash proxy-lite.sh upgrade help >/tmp/pl-upgrade-help.out
          if bash proxy-lite.sh user >/tmp/pl-removed.out 2>&1; then
            echo "Expected proxy-lite user command to fail" >&2
            exit 1
          fi
          grep -q 'proxy-lite 已移除该功能' /tmp/pl-removed.out

      - name: Menu smoke tests
        run: |
          printf '\n' | PL_TEST_ALLOW_NON_ROOT=1 bash proxy-lite.sh menu
          printf '0\n' | PL_TEST_ALLOW_NON_ROOT=1 bash proxy-lite.sh menu
          printf 'x\n' | PL_TEST_ALLOW_NON_ROOT=1 bash proxy-lite.sh menu

      - name: Generated config and adversarial smoke tests
        run: |
          set -euo pipefail
          SCRIPT="$PWD/proxy-lite.sh"
          make_cert() {
            local dir="$1"
            openssl req -x509 -newkey rsa:2048 -nodes -days 1 -subj "/CN=example.com" -keyout "$dir/key.pem" -out "$dir/cert.pem" >/dev/null 2>&1
          }
          # args: root any naive ss_entry any_egress naive_egress ss_egress with_b [legacy_ss]
          write_entry_env() {
            local root="$1" any="$2" naive="$3" ss_entry="$4" any_egress="$5" naive_egress="$6" ss_egress="$7" with_b="$8" legacy_ss="${9:-0}"
            local b_host="" b_port="" b_pass=""
            if [[ "$with_b" == "1" ]]; then
              b_host="198.51.100.20"; b_port="30003"; b_pass="b-landing-secret"
            fi
            mkdir -p "$root/config"; make_cert "$root"
            cat > "$root/config/lite.env" <<EOF
          PM_DOMAIN=example.com
          PM_ROOT=$root
          PM_SERVER_IP=203.0.113.10
          PM_CONTAINER_NAME=pl-test-$(basename "$root")
          PM_IMAGE=ghcr.io/sagernet/sing-box:latest
          PM_TZ=Asia/Shanghai
          PM_NODE_ROLE=entry_a
          ENABLE_ANYTLS=$any
          ENABLE_NAIVE=$naive
          ENABLE_SS=$legacy_ss
          ENABLE_SS_ENTRY=$ss_entry
          ANYTLS_EGRESS=$any_egress
          NAIVE_EGRESS=$naive_egress
          SS_EGRESS=$ss_egress
          ANYTLS_PORT=30001
          NAIVE_PORT=30002
          SS_PORT=30004
          ANYTLS_NAME=proxy
          ANYTLS_PASSWORD=any-secret
          NAIVE_USERNAME=u
          NAIVE_PASSWORD=naive-secret
          SS_METHOD=aes-128-gcm
          SS_PASSWORD=user-ss-secret
          B_SS_HOST=$b_host
          B_SS_PORT=$b_port
          B_SS_METHOD=aes-128-gcm
          B_SS_PASSWORD=$b_pass
          CERT_FILE=$root/cert.pem
          KEY_FILE=$root/key.pem
          CREATED_AT='2026-06-16 00:00:00'
          EOF
          }
          # args: root any naive ss_entry
          write_b_env() {
            local root="$1" any="$2" naive="$3" ss_entry="$4" cert=""
            mkdir -p "$root/config"
            if [[ "$any" == "1" || "$naive" == "1" ]]; then make_cert "$root"; cert="$root/cert.pem"; fi
            cat > "$root/config/lite.env" <<EOF
          PM_DOMAIN=b.example.com
          PM_ROOT=$root
          PM_SERVER_IP=198.51.100.20
          PM_CONTAINER_NAME=pl-b-$(basename "$root")
          PM_IMAGE=ghcr.io/sagernet/sing-box:latest
          PM_TZ=Asia/Shanghai
          PM_NODE_ROLE=egress_b
          ENABLE_ANYTLS=$any
          ENABLE_NAIVE=$naive
          ENABLE_SS=1
          ENABLE_SS_ENTRY=$ss_entry
          ANYTLS_EGRESS=direct
          NAIVE_EGRESS=direct
          SS_EGRESS=direct
          ANYTLS_PORT=30011
          NAIVE_PORT=30012
          SS_PORT=30014
          ANYTLS_NAME=proxy
          ANYTLS_PASSWORD=any-secret
          NAIVE_USERNAME=u
          NAIVE_PASSWORD=naive-secret
          SS_METHOD=aes-128-gcm
          SS_PASSWORD=user-ss-secret
          B_SS_HOST=
          B_SS_PORT=30013
          B_SS_METHOD=aes-128-gcm
          B_SS_PASSWORD=b-landing-secret
          CERT_FILE=$cert
          KEY_FILE=$([ -n "$cert" ] && echo "$root/key.pem")
          CREATED_AT='2026-06-16 00:00:00'
          EOF
          }
          assert_no_user_ss() {
            local root="$1"
            jq -e '[.inbounds[] | select(.tag=="ss-in")] | length == 0' "$root/config/sing-box.json" >/dev/null
            test ! -f "$root/config/client/shadowsocks-outbound.json"
          }

          # entry_a anytls direct (no ss entry)
          tmp_any_direct="$(mktemp -d)"
          write_entry_env "$tmp_any_direct" 1 0 0 direct direct direct 0
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_any_direct" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-any-direct.out
          jq -e '.route.final == "direct" and (.route.rule_set == null)' "$tmp_any_direct/config/sing-box.json" >/dev/null
          jq -e '.route.rules[] | select((.inbound == ["anytls-in"]) and .action == "route" and .outbound == "direct")' "$tmp_any_direct/config/sing-box.json" >/dev/null
          jq -e '[.outbounds[] | select(.tag=="egress-b")] | length == 0' "$tmp_any_direct/config/sing-box.json" >/dev/null
          assert_no_user_ss "$tmp_any_direct"

          # entry_a naive via B
          tmp_naive_b="$(mktemp -d)"
          write_entry_env "$tmp_naive_b" 0 1 0 direct egress-b direct 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_naive_b" bash "$SCRIPT" change-secret naive naive-secret >/tmp/pl-naive-b.out
          jq -e '.route.rules[] | select((.inbound == ["naive-in"]) and .outbound == "egress-b")' "$tmp_naive_b/config/sing-box.json" >/dev/null
          jq -e '.outbounds[] | select(.tag=="egress-b")' "$tmp_naive_b/config/sing-box.json" >/dev/null
          ! grep -R "b-landing-secret" "$tmp_naive_b/config/client" >/dev/null
          assert_no_user_ss "$tmp_naive_b"

          # entry_a ss-only direct (NEW)
          tmp_ss_direct="$(mktemp -d)"
          write_entry_env "$tmp_ss_direct" 0 0 1 direct direct direct 0
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ss_direct" bash "$SCRIPT" change-secret ss user-ss-secret >/tmp/pl-ss-direct.out
          jq -e '[.inbounds[] | select(.tag=="ss-in")] | length == 1' "$tmp_ss_direct/config/sing-box.json" >/dev/null
          jq -e '.route.rules[] | select((.inbound == ["ss-in"]) and .outbound == "direct")' "$tmp_ss_direct/config/sing-box.json" >/dev/null
          jq -e '.route.final == "direct"' "$tmp_ss_direct/config/sing-box.json" >/dev/null
          jq -e '[.outbounds[] | select(.tag=="egress-b")] | length == 0' "$tmp_ss_direct/config/sing-box.json" >/dev/null
          test -f "$tmp_ss_direct/config/client/shadowsocks-outbound.json"
          grep -q "user-ss-secret" "$tmp_ss_direct/config/client/shadowsocks-outbound.json"

          # entry_a ss via B (NEW)
          tmp_ss_b="$(mktemp -d)"
          write_entry_env "$tmp_ss_b" 0 0 1 direct direct egress-b 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ss_b" bash "$SCRIPT" change-secret ss user-ss-secret >/tmp/pl-ss-b.out
          jq -e '.route.rules[] | select((.inbound == ["ss-in"]) and .outbound == "egress-b")' "$tmp_ss_b/config/sing-box.json" >/dev/null
          jq -e '.outbounds[] | select(.tag=="egress-b")' "$tmp_ss_b/config/sing-box.json" >/dev/null
          ! grep -R "b-landing-secret" "$tmp_ss_b/config/client" >/dev/null

          # entry_a triple mixed: anytls direct / naive egress-b / ss direct (NEW)
          tmp_triple="$(mktemp -d)"
          write_entry_env "$tmp_triple" 1 1 1 direct egress-b direct 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_triple" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-triple.out
          jq -e '.route.rules[] | select((.inbound == ["anytls-in"]) and .outbound == "direct")' "$tmp_triple/config/sing-box.json" >/dev/null
          jq -e '.route.rules[] | select((.inbound == ["naive-in"]) and .outbound == "egress-b")' "$tmp_triple/config/sing-box.json" >/dev/null
          jq -e '.route.rules[] | select((.inbound == ["ss-in"]) and .outbound == "direct")' "$tmp_triple/config/sing-box.json" >/dev/null
          jq -e '.outbounds[] | select(.tag=="egress-b")' "$tmp_triple/config/sing-box.json" >/dev/null
          test -f "$tmp_triple/config/client/anytls-outbound.json"
          test -f "$tmp_triple/config/client/naive-outbound.json"
          test -f "$tmp_triple/config/client/shadowsocks-outbound.json"
          ! grep -R "b-landing-secret" "$tmp_triple/config/client" >/dev/null
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_triple" bash "$SCRIPT" check >/tmp/pl-triple-check.out

          # entry_a all via B (any/naive/ss all egress-b)
          tmp_all_b="$(mktemp -d)"
          write_entry_env "$tmp_all_b" 1 1 1 egress-b egress-b egress-b 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_all_b" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-all-b.out
          jq -e '[.route.rules[] | select(.outbound=="egress-b")] | length == 3' "$tmp_all_b/config/sing-box.json" >/dev/null
          jq -e '.route.final == "direct"' "$tmp_all_b/config/sing-box.json" >/dev/null

          # entry_a all direct (no B)
          tmp_all_direct="$(mktemp -d)"
          write_entry_env "$tmp_all_direct" 1 1 1 direct direct direct 0
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_all_direct" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-all-direct.out
          jq -e '[.outbounds[] | select(.tag=="egress-b")] | length == 0' "$tmp_all_direct/config/sing-box.json" >/dev/null

          # egress_b landing only (no user entries)
          tmp_b="$(mktemp -d)"
          write_b_env "$tmp_b" 0 0 0
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_b" bash "$SCRIPT" change-secret b-ss b-landing-secret >/tmp/pl-b-render.out
          jq -e '.inbounds[] | select(.tag=="ss-landing-in" and .listen_port == 30013)' "$tmp_b/config/sing-box.json" >/dev/null
          jq -e '[.inbounds[] | select(.tag=="anytls-in" or .tag=="naive-in" or .tag=="ss-in")] | length == 0' "$tmp_b/config/sing-box.json" >/dev/null
          jq -e '.route.final == "direct" and (.route.rule_set == null)' "$tmp_b/config/sing-box.json" >/dev/null
          test -z "$(find "$tmp_b/config/client" -name '*.json' -print -quit 2>/dev/null)"
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_b" bash "$SCRIPT" check >/tmp/pl-b-singbox-check.out

          # egress_b landing + anytls entry (NEW): B serves anytls directly
          tmp_b_anytls="$(mktemp -d)"
          write_b_env "$tmp_b_anytls" 1 0 0
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_b_anytls" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-b-anytls.out
          jq -e '.inbounds[] | select(.tag=="ss-landing-in" and .listen_port == 30013)' "$tmp_b_anytls/config/sing-box.json" >/dev/null
          jq -e '.inbounds[] | select(.tag=="anytls-in" and .listen_port == 30011)' "$tmp_b_anytls/config/sing-box.json" >/dev/null
          jq -e '[.inbounds[] | select(.tag=="ss-in")] | length == 0' "$tmp_b_anytls/config/sing-box.json" >/dev/null
          test -f "$tmp_b_anytls/config/client/anytls-outbound.json"
          ! grep -R "b-landing-secret" "$tmp_b_anytls/config/client" >/dev/null

          # egress_b landing + ss entry (NEW): two SS inbounds, isolated creds
          tmp_b_ss="$(mktemp -d)"
          write_b_env "$tmp_b_ss" 0 0 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_b_ss" bash "$SCRIPT" change-secret ss user-ss-secret >/tmp/pl-b-ss.out
          jq -e '.inbounds[] | select(.tag=="ss-landing-in" and .listen_port == 30013 and .password == "b-landing-secret")' "$tmp_b_ss/config/sing-box.json" >/dev/null
          jq -e '.inbounds[] | select(.tag=="ss-in" and .listen_port == 30014 and .password == "user-ss-secret")' "$tmp_b_ss/config/sing-box.json" >/dev/null
          test -f "$tmp_b_ss/config/client/shadowsocks-outbound.json"
          grep -q "user-ss-secret" "$tmp_b_ss/config/client/shadowsocks-outbound.json"
          ! grep -q "b-landing-secret" "$tmp_b_ss/config/client/shadowsocks-outbound.json"
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_b_ss" bash "$SCRIPT" check >/tmp/pl-b-ss-check.out

          # backup/rollback/upgrade smoke (on triple-mixed node)
          tmp_ops="$(mktemp -d)"
          write_entry_env "$tmp_ops" 1 1 0 direct egress-b direct 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ops" bash "$SCRIPT" change-secret naive changed-naive >/tmp/pl-ops.out
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ops" bash "$SCRIPT" backup list >/tmp/pl-backup-list.out
          grep -q 'lite.env' /tmp/pl-backup-list.out
          grep -q 'NAIVE_PASSWORD=changed-naive' "$tmp_ops/config/lite.env"
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ops" bash "$SCRIPT" rollback latest >/tmp/pl-rollback.out
          grep -q 'NAIVE_PASSWORD=naive-secret' "$tmp_ops/config/lite.env"
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ops" bash "$SCRIPT" upgrade --image ghcr.io/sagernet/sing-box:latest >/tmp/pl-upgrade.out
          jq -e '.route.final == "direct"' "$tmp_ops/config/sing-box.json" >/dev/null
          if PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ops" bash "$SCRIPT" upgrade --image ghcr.io/sagernet/sing-box:this-tag-should-not-exist >/tmp/pl-upgrade-fail.out 2>&1; then
            echo "Expected invalid-image proxy-lite upgrade to fail" >&2
            exit 1
          fi
          grep -q '候选镜像拉取失败' /tmp/pl-upgrade-fail.out
          grep -q 'PM_IMAGE=ghcr.io/sagernet/sing-box:latest' "$tmp_ops/config/lite.env"

          # migration: v0.1.1 entry_a env (ENABLE_SS=1, no ENABLE_SS_ENTRY) -> no ss-in
          tmp_legacy="$(mktemp -d)"
          write_entry_env "$tmp_legacy" 1 0 0 direct direct direct 0 1
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_legacy" bash "$SCRIPT" change-secret anytls any-secret >/tmp/pl-legacy.out
          assert_no_user_ss "$tmp_legacy"
          ! grep -R "user-ss-secret" "$tmp_legacy/config/client" >/dev/null

          # migration: v0.1.1 egress_b env (ENABLE_SS=1 landing, no ENABLE_SS_ENTRY) -> only landing (NEW)
          tmp_legacy_b="$(mktemp -d)"; mkdir -p "$tmp_legacy_b/config"
          cat > "$tmp_legacy_b/config/lite.env" <<EOF
          PM_DOMAIN=b.example.com
          PM_ROOT=$tmp_legacy_b
          PM_SERVER_IP=198.51.100.20
          PM_CONTAINER_NAME=pl-legacy-b
          PM_IMAGE=ghcr.io/sagernet/sing-box:latest
          PM_TZ=Asia/Shanghai
          PM_NODE_ROLE=egress_b
          ENABLE_ANYTLS=0
          ENABLE_NAIVE=0
          ENABLE_SS=1
          ANYTLS_EGRESS=direct
          NAIVE_EGRESS=direct
          ANYTLS_PORT=
          NAIVE_PORT=
          SS_PORT=30003
          ANYTLS_NAME=proxy
          ANYTLS_PASSWORD=
          NAIVE_USERNAME=proxyuser
          NAIVE_PASSWORD=
          SS_METHOD=aes-128-gcm
          SS_PASSWORD=b-landing-secret
          B_SS_HOST=
          B_SS_PORT=30003
          B_SS_METHOD=aes-128-gcm
          B_SS_PASSWORD=b-landing-secret
          CERT_FILE=
          KEY_FILE=
          CREATED_AT='2026-06-15 00:00:00'
          EOF
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_legacy_b" bash "$SCRIPT" change-secret b-ss b-landing-secret >/tmp/pl-legacy-b.out
          jq -e '.inbounds[] | select(.tag=="ss-landing-in" and .listen_port == 30003)' "$tmp_legacy_b/config/sing-box.json" >/dev/null
          jq -e '[.inbounds[] | select(.tag=="ss-in")] | length == 0' "$tmp_legacy_b/config/sing-box.json" >/dev/null

          # adversarial: entry_a ss via B missing B params -> fail
          tmp_missing_b="$(mktemp -d)"
          write_entry_env "$tmp_missing_b" 0 0 1 direct direct egress-b 0
          if PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_missing_b" bash "$SCRIPT" change-secret ss user-ss-secret >/tmp/pl-missing-b.out 2>&1; then
            echo "Expected missing B settings to fail" >&2; exit 1
          fi
          grep -q 'B_SS_HOST' /tmp/pl-missing-b.out

          # adversarial: egress_b ss entry port == landing port -> fail (NEW)
          tmp_collide="$(mktemp -d)"; mkdir -p "$tmp_collide/config"
          cat > "$tmp_collide/config/lite.env" <<EOF
          PM_DOMAIN=b.example.com
          PM_ROOT=$tmp_collide
          PM_SERVER_IP=198.51.100.20
          PM_CONTAINER_NAME=pl-collide
          PM_IMAGE=ghcr.io/sagernet/sing-box:latest
          PM_TZ=Asia/Shanghai
          PM_NODE_ROLE=egress_b
          ENABLE_ANYTLS=0
          ENABLE_NAIVE=0
          ENABLE_SS=1
          ENABLE_SS_ENTRY=1
          ANYTLS_EGRESS=direct
          NAIVE_EGRESS=direct
          SS_EGRESS=direct
          ANYTLS_PORT=
          NAIVE_PORT=
          SS_PORT=30013
          SS_METHOD=aes-128-gcm
          SS_PASSWORD=user-ss-secret
          B_SS_HOST=
          B_SS_PORT=30013
          B_SS_METHOD=aes-128-gcm
          B_SS_PASSWORD=b-landing-secret
          CERT_FILE=
          KEY_FILE=
          CREATED_AT='2026-06-16 00:00:00'
          EOF
          if PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_collide" bash "$SCRIPT" change-secret b-ss b-landing-secret >/tmp/pl-collide.out 2>&1; then
            echo "Expected port collision to fail" >&2; exit 1
          fi
          grep -q '端口重复' /tmp/pl-collide.out

          # change-port/secret ss on a node WITHOUT ss entry -> fail with 未启用
          if PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_any_direct" bash "$SCRIPT" change-port ss 30009 >/tmp/pl-change-port-ss.out 2>&1; then
            echo "Expected change-port ss to fail when ss entry disabled" >&2; exit 1
          fi
          grep -q '未启用 Shadowsocks 用户入口' /tmp/pl-change-port-ss.out
          # change-secret ss on a node WITH ss entry -> succeed (NEW positive)
          PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp_ss_direct" bash "$SCRIPT" change-secret ss rotated-ss >/tmp/pl-change-secret-ss-ok.out
          grep -q 'SS_PASSWORD=rotated-ss' "$tmp_ss_direct/config/lite.env"

          if PL_TEST_ALLOW_NON_ROOT=1 bash "$SCRIPT" install --yes --node-role invalid-role --root "$(mktemp -d)" >/tmp/pl-bad-role.out 2>&1; then
            echo "Expected invalid role to fail" >&2; exit 1
          fi
          grep -q '未知节点角色：invalid-role' /tmp/pl-bad-role.out
          if PL_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$(mktemp -d)" bash "$SCRIPT" info >/tmp/pl-missing-env.out 2>&1; then
            echo "Expected missing env info to fail" >&2; exit 1
          fi
          grep -q '未找到配置文件' /tmp/pl-missing-env.out
          if PL_TEST_ALLOW_NON_ROOT=1 bash "$SCRIPT" install --yes --node-role entry_a --domain example.com --server-ip 203.0.113.10 --root "$(mktemp -d)" --components unknown >/tmp/pl-bad-component.out 2>&1; then
            echo "Expected unknown component to fail" >&2; exit 1
          fi
          grep -q '未知组件：unknown' /tmp/pl-bad-component.out

          # install smokes
          install_direct_root="$(mktemp -d)"
          make_cert "$install_direct_root"
          PL_TEST_ALLOW_NON_ROOT=1 bash "$SCRIPT" install --yes --node-role entry_a --domain example.com --server-ip 203.0.113.10 --root "$install_direct_root" --components anytls --anytls-egress direct --cert-file "$install_direct_root/cert.pem" --key-file "$install_direct_root/key.pem" --anytls-port 31001 --container-name pl-install-direct >/tmp/pl-install-direct.out
          jq -e '[.outbounds[] | select(.tag=="egress-b")] | length == 0' "$install_direct_root/config/sing-box.json" >/dev/null
          docker rm -f pl-install-direct >/dev/null 2>&1 || true

          # install: entry_a ss-only via --components ss (NEW positive)
          install_ss_root="$(mktemp -d)"
          PL_TEST_ALLOW_NON_ROOT=1 bash "$SCRIPT" install --yes --node-role entry_a --domain example.com --server-ip 203.0.113.10 --root "$install_ss_root" --components ss --ss-egress direct --ss-port 31004 --container-name pl-install-ss >/tmp/pl-install-ss.out
          jq -e '.inbounds[] | select(.tag=="ss-in" and .listen_port == 31004)' "$install_ss_root/config/sing-box.json" >/dev/null
          test -f "$install_ss_root/config/client/shadowsocks-outbound.json"
          docker rm -f pl-install-ss >/dev/null 2>&1 || true

          # install: egress_b landing via --b-ss-* (was --ss-* in v0.1.1)
          install_b_root="$(mktemp -d)"
          PL_TEST_ALLOW_NON_ROOT=1 bash "$SCRIPT" install --yes --node-role egress_b --domain b.example.com --server-ip 198.51.100.20 --root "$install_b_root" --b-ss-port 31003 --b-ss-password b-landing-secret --container-name pl-install-b >/tmp/pl-install-b.out
